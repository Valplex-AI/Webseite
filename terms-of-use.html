<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Valplex terms of use placeholder." />
    <title>Valplex | Terms of Use</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #000000;
            --fg: #f5f5f5;
            --muted: rgba(255, 255, 255, 0.72);
            --font-body: "Inter", "Avenir Next", "Segoe UI", Arial, sans-serif;
            --font-display: "Plus Jakarta Sans", "Inter", "Avenir Next", "Segoe UI", Arial, sans-serif;
            --edge-space: clamp(20px, 4vw, 48px);
            --site-header-height: clamp(92px, 12vh, 118px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 20;
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .site-header-inner {
            width: min(1120px, calc(100% - (2 * var(--edge-space))));
            min-height: var(--site-header-height);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .site-header-brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: clamp(12px, 2vw, 18px);
            color: var(--fg);
            text-decoration: none;
            font-family: var(--font-display);
            font-size: clamp(18px, 2.5vw, 34px);
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        .site-header-logo {
            width: clamp(54px, 7vw, 78px);
            height: auto;
            display: block;
        }

        .page {
            flex: 1;
            width: min(1120px, calc(100% - (2 * var(--edge-space))));
            margin: 0 auto;
            padding: calc(var(--site-header-height) + clamp(48px, 9vw, 120px)) 0 clamp(56px, 8vw, 96px);
            display: flex;
            align-items: center;
        }

        .page-copy {
            max-width: 720px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(38px, 6vw, 72px);
            letter-spacing: -0.04em;
            line-height: 0.95;
            margin-bottom: 20px;
        }

        p {
            color: var(--muted);
            font-size: clamp(17px, 1.9vw, 22px);
            line-height: 1.6;
        }

        .site-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 28px var(--edge-space) 40px;
            background: #000000;
        }

        .footer-nav {
            width: min(1120px, 100%);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(18px, 4vw, 40px);
            flex-wrap: wrap;
        }

        .footer-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .footer-link:hover {
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        @media (max-width: 780px) {
            .page {
                align-items: flex-start;
            }

            .footer-nav {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="site-header" aria-label="Primary navigation">
        <div class="site-header-inner">
            <a class="site-header-brand" href="index.html" aria-label="Back to home">
                <img src="valplex-logo.png" class="site-header-logo" alt="" width="78" height="78" decoding="async" />
                <span>Valplex</span>
            </a>
        </div>
    </header>
    <main class="page">
        <section class="page-copy" aria-label="Terms of Use">
            <h1>Terms of Use</h1>
            <p>Terms of use content will be added here soon.</p>
        </section>
    </main>
    <footer class="site-footer" aria-label="Legal links">
        <nav class="footer-nav">
            <a class="footer-link" href="privacy-policy.html">Privacy Policy</a>
            <a class="footer-link" href="terms-of-use.html">Terms of Use</a>
            <a class="footer-link" href="legal.html">Legal</a>
        </nav>
    </footer>
</body>
</html>
